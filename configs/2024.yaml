year: 2024
lumi: 109.82   # To be updated with actual 2024 luminosity

# Correction file paths (user must provide actual files)
corrections:
   pileup: data/corrections/2024/Run3-24CDEReprocessingFGHIPrompt-Summer24-NanoAODv15_puWeights.json.gz
   pileup_name: "Collisions2024_355100_357900_eraBCD_GoldenJson"
   btagSF: data/corrections/2024/Run3-24CDEReprocessingFGHIPrompt-Summer24-NanoAODv15_btagging.json.gz
   muonSF_highPT: data/corrections/2024/Run3-24CDEReprocessingFGHIPrompt-Summer24-NanoAODv15_muon_HighPt.json.gz
   muonSF_highPT_name: "NUM_TightPFIso_DEN_TightID"
   muonSF_lowPT: data/corrections/2024/Run3-24CDEReprocessingFGHIPrompt-Summer24-NanoAODv15_muon_JPsi.json.gz
   muonSF_lowPT_name: "NUM_LooseID_DEN_TrackerMuons"
   electronSF: data/corrections/2024/Run3-24CDEReprocessingFGHIPrompt-Summer24-NanoAODv15_electron.json.gz
   electronSF_name: "2024Re-recoBCD"
   electronSF_WP: "Tight"
   electronHLT: data/corrections/2024/Run3-24CDEReprocessingFGHIPrompt-Summer24-NanoAODv15_electronHlt.json.gz
   electronHLT_name: "2024Re-recoBCD"
   electronHLT_WP: "HLT_SF_Ele30_TightID"
   jetJEC: data/corrections/2024/Run3-24CDEReprocessingFGHIPrompt-Summer24-NanoAODv15_jet_jerc.json.gz
   jetJEC_tag: "Summer24_22Sep2023_V1_MC"
   jetJEC_algo: "AK4PFPuppi"
   jetJEC_level: "L1L2L3Res"
   jetJEC_unc: "Total"

# Data sample settings (set is_data: true when running on collision data)
data:
   is_data: false
   golden_json: data/corrections/2024/Cert_Collisions2024_378981_386951_Golden.json

# Trigger paths
triggers:
   MET: ["HLT_PFMETNoMu120_PFMHTNoMu120_IDTight","HLT_PFMETNoMu130_PFMHTNoMu130_IDTight","HLT_PFMETNoMu140_PFMHTNoMu140_IDTight"]
   SingleMuon: ["HLT_IsoMu24", "HLT_IsoMu27"]
   SingleElectron: ["HLT_Ele30_WPTight_Gsf_v"]

# MET filters
met_filters:
   - "Flag_goodVertices"
   - "Flag_globalSuperTightHalo2016Filter"
   - "Flag_EcalDeadCellTriggerPrimitiveFilter"
   - "Flag_BadPFMuonFilter"
   - "Flag_BadPFMuonDzFilter"
   - "Flag_hfNoisyHitsFilter"
   - "Flag_eeBadScFilter"
   - "Flag_ecalBadCalibFilter"

# Object selection (preselection: loose pt>10; region: tight pt>20, leading pt>30 in CRs)
objects:
   muons:
      pt_min: 20.0
      pt_min_loose: 10.0
      eta_max: 2.4
      id_loose: "loose"
      iso_loose: "loose"
      id_tight: "tight"
      iso_tight: "tight"

   electrons:
      pt_min: 20.0
      pt_min_loose: 10.0
      eta_max: 2.5
      id_loose: "loose"
      iso_loose: "loose"
      id_tight: "tight"
      iso_tight: "tight"

   taus:
      pt_min: 20.0
      pt_min_loose: 10.0
      eta_max: 2.3
      id_loose: "loose"
      id_tight: "tight"
      decay_modes: [0, 1, 2, 10, 11]

   jets:
      pt_min: 30.0
      eta_max: 2.5
      id: "tight"

   fatjets:
      pt_min: 200.0
      eta_max: 2.4
      id: "tight"

# B-tagging working points
btagging:
   wp: "medium"   # loose, medium, tight
   algorithm: "deepJet"   # deepJet, deepCSV

# Event selection (aligned with SUS-23-008)
event_selection:
   min_muons: 0
   max_muons: 2
   min_electrons: 0
   max_electrons: 2
   min_taus: 0
   max_taus: 0
   min_jets: 1
   max_jets: 6
   min_bjets: 1
   met_min: 250.0      # event passes if MET > 250 GeV or Recoil > 250 GeV
   jet1_pt_min: 100.0
   delta_phi_min: 0.5

# Cleaning parameters
cleaning:
   dr_muon_jet: 0.4
   dr_electron_jet: 0.4
   dr_tau_jet: 0.4
